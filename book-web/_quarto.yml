project:
  type: book
  output-dir: _book

book:
  title: "Math for Machine Learning"
  subtitle: "A simulation-first approach"
  author: "Nithin Vadekkapat"
  date: today
  search: true
  repo-url: https://github.com/nv-mldev/math-bootcamp
  repo-actions: [edit, issue]
  cover-image: figures/cover.png
  favicon: figures/cover.png
  sidebar:
    style: docked
    background: light
  chapters:
    - cover.qmd
    - index.qmd
    - chapters/introduction.qmd
    - part: "Probability"
      chapters:
        - chapters/probability/what_is_probability.qmd
        - chapters/probability/conditional.qmd
        - chapters/probability/bernoulli.qmd
        - chapters/probability/binomial.qmd
        - chapters/probability/poisson.qmd
        - chapters/probability/normal.qmd
        - chapters/probability/clt.qmd
        - chapters/probability/sensor_model.qmd
        - chapters/probability/applied_sensors.qmd
        - chapters/probability/stochastic_processes.qmd
        - chapters/probability/exercises.qmd
        - chapters/probability/appendix_foundations.qmd
    - part: "Statistics"
      chapters:
        - chapters/statistics/eda.qmd
        - chapters/statistics/distributions.qmd
        - chapters/statistics/pmf.qmd
        - chapters/statistics/cdf.qmd
        - chapters/statistics/modeling.qmd
        - chapters/statistics/pdf.qmd
        - chapters/statistics/relationships.qmd
        - chapters/statistics/estimation.qmd
        - chapters/statistics/hypothesis_testing.qmd
        - chapters/statistics/least_squares.qmd
        - chapters/statistics/regression.qmd
        - chapters/statistics/time_series.qmd
        - chapters/statistics/survival.qmd
        - chapters/statistics/analytic_methods.qmd
        - chapters/statistics/exercises.qmd
    - part: "Linear Algebra"
      chapters:
        - chapters/linear_algebra/vectors.qmd
        - chapters/linear_algebra/norms.qmd
        - chapters/linear_algebra/orthogonality.qmd
        - chapters/linear_algebra/transforms.qmd
        - chapters/linear_algebra/applied_images.qmd
        - chapters/linear_algebra/exercises.qmd

bibliography: references.bib

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    code-copy: true
    code-overflow: wrap
    html-math-method: katex
